<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle: Gold (USD = value) -->
  <circle cx="200" cy="200" r="200" fill="#C4A052"/>

  <!-- Inner navy circle -->
  <circle cx="200" cy="200" r="160" fill="#1a2332"/>

  <!-- Stylized L -->
  <path
    d="M 130 110
       L 130 250
       L 250 250"
    stroke="#FAFBFC"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Gold dot accent (matching brand PFP) -->
  <circle cx="250" cy="250" r="16" fill="#C4A052"/>

</svg>
