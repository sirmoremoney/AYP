<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle: Lazy Navy -->
  <circle cx="200" cy="200" r="200" fill="#1a2332"/>

  <!-- Combined L + $ mark -->
  <!-- The L shape -->
  <path
    d="M 110 80
       L 110 280
       L 220 280"
    stroke="#FAFBFC"
    stroke-width="40"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Dollar sign integrated into design -->
  <path
    d="M 270 120
       C 320 120, 320 180, 270 180
       C 220 180, 220 240, 270 240"
    stroke="#C4A052"
    stroke-width="28"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Dollar sign vertical line -->
  <line x1="270" y1="95" x2="270" y2="265" stroke="#C4A052" stroke-width="12" stroke-linecap="round"/>

</svg>
