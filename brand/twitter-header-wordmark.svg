<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Lazy Navy -->
  <rect width="1500" height="500" fill="#1a2332"/>

  <!-- Subtle gradient overlay for depth -->
  <defs>
    <linearGradient id="fadeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2838;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#fadeGradient)"/>

  <!-- Wordmark: "lazy" on left -->
  <text
    x="80"
    y="275"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="700"
    fill="#FAFBFC"
    letter-spacing="-0.03em"
  >
    lazy
  </text>

  <!-- Tagline on right -->
  <text
    x="1420"
    y="268"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="36"
    font-weight="400"
    fill="#64748B"
    text-anchor="end"
    letter-spacing="-0.01em"
  >
    Yield on autopilot.
  </text>

</svg>
