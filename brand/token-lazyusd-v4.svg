<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle: Lazy Navy -->
  <circle cx="200" cy="200" r="200" fill="#1a2332"/>

  <!-- Gold ring (represents value/yield) -->
  <circle cx="200" cy="200" r="170" stroke="#C4A052" stroke-width="8" fill="none"/>

  <!-- "lazy" small text at top -->
  <text
    x="200"
    y="130"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="36"
    font-weight="600"
    fill="#64748B"
    text-anchor="middle"
    letter-spacing="-0.02em"
  >lazy</text>

  <!-- Large USD dollar sign -->
  <text
    x="200"
    y="260"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="140"
    font-weight="700"
    fill="#FAFBFC"
    text-anchor="middle"
  >$</text>

</svg>
