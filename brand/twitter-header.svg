<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1500" height="500" fill="#1a2332"/>

  <!-- Subtle grid pattern (optional texture) -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#242d3d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1500" height="500" fill="url(#grid)" opacity="0.4"/>

  <!-- Tagline -->
  <text
    x="1420"
    y="265"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="42"
    font-weight="500"
    fill="#FAFBFC"
    text-anchor="end"
    letter-spacing="-0.01em"
  >
    Yield on autopilot.
  </text>

</svg>
