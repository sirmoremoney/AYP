<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified feet-up icon for Lazy Protocol -->
  <!-- Based on the cozy feet-up concept - simplified for scalability -->

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#1a2332"/>

  <!-- Inner ring -->
  <circle cx="200" cy="200" r="185" stroke="#2a3444" stroke-width="2" fill="none"/>

  <!-- Simplified feet/legs silhouette -->
  <!-- Left leg -->
  <path
    d="M 140 320
       L 140 200
       Q 140 160, 160 140
       L 170 100"
    stroke="#FAFBFC"
    stroke-width="24"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Right leg -->
  <path
    d="M 220 320
       L 220 200
       Q 220 160, 240 140
       L 250 100"
    stroke="#FAFBFC"
    stroke-width="24"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Left foot -->
  <ellipse cx="170" cy="90" rx="28" ry="20" fill="#FAFBFC"/>

  <!-- Right foot -->
  <ellipse cx="250" cy="85" rx="28" ry="20" fill="#FAFBFC"/>

  <!-- Ottoman/footrest line -->
  <line x1="100" y1="320" x2="300" y2="320" stroke="#FAFBFC" stroke-width="4" stroke-linecap="round"/>

  <!-- Thought bubble (yield working) -->
  <circle cx="310" cy="80" r="24" fill="#C4A052"/>
  <circle cx="290" cy="110" r="10" fill="#C4A052"/>
  <circle cx="275" cy="130" r="6" fill="#C4A052"/>

  <!-- Dollar sign in thought bubble -->
  <text
    x="310"
    y="90"
    font-family="Inter, -apple-system, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#1a2332"
    text-anchor="middle"
  >$</text>

</svg>
