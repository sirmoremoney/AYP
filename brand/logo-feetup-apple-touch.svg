<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Feet-up icon for Apple Touch Icon (180x180) -->

  <!-- Rounded square background -->
  <rect width="180" height="180" rx="40" fill="#1a2332"/>

  <!-- Feet -->
  <ellipse cx="65" cy="50" rx="18" ry="14" fill="#FAFBFC"/>
  <ellipse cx="115" cy="45" rx="18" ry="14" fill="#FAFBFC"/>

  <!-- Legs -->
  <line x1="65" y1="64" x2="65" y2="140" stroke="#FAFBFC" stroke-width="14" stroke-linecap="round"/>
  <line x1="115" y1="59" x2="115" y2="140" stroke="#FAFBFC" stroke-width="14" stroke-linecap="round"/>

  <!-- Footrest -->
  <line x1="30" y1="150" x2="150" y2="150" stroke="#FAFBFC" stroke-width="6" stroke-linecap="round"/>

  <!-- Gold thought bubble -->
  <circle cx="150" cy="35" r="18" fill="#C4A052"/>
  <circle cx="138" cy="55" r="8" fill="#C4A052"/>
  <circle cx="128" cy="70" r="5" fill="#C4A052"/>

  <!-- $ in bubble -->
  <text
    x="150"
    y="43"
    font-family="Inter, -apple-system, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#1a2332"
    text-anchor="middle"
  >$</text>

</svg>
