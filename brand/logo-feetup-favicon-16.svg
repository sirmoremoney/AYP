<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ultra-simplified feet-up for favicon 16x16 -->

  <!-- Background circle -->
  <circle cx="8" cy="8" r="8" fill="#1a2332"/>

  <!-- Two minimal foot shapes -->
  <ellipse cx="5" cy="5" rx="2" ry="1.5" fill="#FAFBFC"/>
  <ellipse cx="11" cy="4.5" rx="2" ry="1.5" fill="#FAFBFC"/>

  <!-- Leg lines -->
  <line x1="5" y1="6.5" x2="5" y2="12" stroke="#FAFBFC" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="6" x2="11" y2="12" stroke="#FAFBFC" stroke-width="2" stroke-linecap="round"/>

  <!-- Footrest -->
  <line x1="2" y1="13" x2="14" y2="13" stroke="#FAFBFC" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tiny gold dot -->
  <circle cx="14" cy="3" r="1.5" fill="#C4A052"/>

</svg>
