<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo icon mark: L with gold dot (matches Twitter PFP) -->
  <circle cx="200" cy="200" r="200" fill="#1a2332"/>

  <!-- Stylized "L" -->
  <path
    d="M 130 120
       L 130 280
       L 270 280"
    stroke="#FAFBFC"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Gold accent dot -->
  <circle cx="270" cy="280" r="16" fill="#C4A052"/>
</svg>
