<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle: Lazy Navy -->
  <circle cx="200" cy="200" r="200" fill="#1a2332"/>

  <!-- Subtle inner shadow/depth -->
  <circle cx="200" cy="200" r="175" stroke="#141a24" stroke-width="8" fill="none"/>

  <!-- Dollar sign: white, slightly stylized -->
  <text
    x="200"
    y="250"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="190"
    font-weight="800"
    fill="#FAFBFC"
    text-anchor="middle"
  >$</text>

  <!-- Small gold accent bar below -->
  <rect x="160" y="320" width="80" height="6" rx="3" fill="#C4A052"/>

</svg>
